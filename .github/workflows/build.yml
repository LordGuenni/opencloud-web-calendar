name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Create release archive
        run: |
          mkdir web-calendar
          cp -r dist/* web-calendar/
          zip -r web-calendar.zip web-calendar

      - uses: actions/upload-artifact@v7
        with:
          name: web-calendar
          path: web-calendar.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: web-calendar

      - uses: softprops/action-gh-release@v3
        with:
          files: web-calendar.zip
          generate_release_notes: true
